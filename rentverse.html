<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentVerse — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   RESET & ROOT
══════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:      #070a12;
  --surface: #0c101a;
  --card:    #111520;
  --card2:   #141825;
  --border:  rgba(99,130,230,0.12);
  --border2: rgba(99,130,230,0.2);
  --blue:    #4f8ef7;
  --purple:  #a259ff;
  --cyan:    #00e5ff;
  --green:   #00d084;
  --orange:  #ff9500;
  --pink:    #ff6b9d;
  --red:     #ff4466;
  --yellow:  #ffd60a;
  --white:   #eef2ff;
  --lgray:   #8892aa;
  --gray:    #525d75;
  --sidebar: 260px;
  --topbar:  60px;
}

html, body { height:100%; background:var(--bg); color:var(--white); font-family:'Instrument Sans',sans-serif; overflow:hidden; }

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
.app { display:flex; height:100vh; overflow:hidden; }

/* ══════════════════════════════════════
   SIDEBAR
══════════════════════════════════════ */
.sidebar {
  width: var(--sidebar);
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
}

.sidebar::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 200px;
  background: radial-gradient(ellipse at 30% 0%, rgba(79,142,247,0.12) 0%, transparent 70%);
  pointer-events: none;
}

/* Logo area */
.sidebar-logo {
  padding: 1.2rem 1.4rem;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  flex-shrink: 0;
}

.sidebar-logo svg { width:38px; height:38px; flex-shrink:0; filter:drop-shadow(0 2px 10px rgba(79,142,247,0.4)); }

.logo-txt .name {
  font-family: 'Cabinet Grotesk', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  line-height: 1;
}
.logo-txt .name .r { color:var(--blue); }
.logo-txt .name .v { color:var(--purple); }
.logo-txt .tag { font-size:0.45rem; letter-spacing:3px; color:var(--gray); text-transform:uppercase; margin-top:2px; }

/* User badge */
.sidebar-user {
  margin: 1rem;
  padding: 0.9rem 1rem;
  background: rgba(79,142,247,0.06);
  border: 1px solid var(--border);
  border-radius: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.sidebar-user:hover { background:rgba(79,142,247,0.1); border-color:var(--border2); }
.user-av { width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,var(--blue),var(--purple)); display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
.user-inf strong { display:block; font-size:0.82rem; font-weight:600; color:var(--white); }
.user-inf span { font-size:0.72rem; color:var(--lgray); }
.user-badge { margin-left:auto; width:8px; height:8px; border-radius:50%; background:var(--green); flex-shrink:0; box-shadow:0 0 6px var(--green); }

/* Nav sections */
.nav-section { padding: 0.6rem 0.8rem; flex:1; overflow-y:auto; overflow-x:hidden; }
.nav-section::-webkit-scrollbar { width:4px; }
.nav-section::-webkit-scrollbar-track { background:transparent; }
.nav-section::-webkit-scrollbar-thumb { background:rgba(120,140,200,0.2); border-radius:4px; }

.nav-label { font-size:0.6rem; letter-spacing:2.5px; text-transform:uppercase; color:var(--gray); padding: 0.6rem 0.6rem 0.4rem; font-weight:600; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 0.7rem 0.9rem;
  border-radius: 11px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 2px;
  position: relative;
  white-space: nowrap;
  overflow: hidden;
}
.nav-item:hover { background:rgba(255,255,255,0.05); }
.nav-item.active {
  background: linear-gradient(90deg, rgba(79,142,247,0.15), rgba(162,89,255,0.08));
  border: 1px solid rgba(79,142,247,0.2);
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 3px;
  background: linear-gradient(180deg, var(--blue), var(--purple));
  border-radius: 0 2px 2px 0;
}
.nav-icon { font-size:1.1rem; width:22px; text-align:center; flex-shrink:0; }
.nav-txt { font-size:0.85rem; font-weight:500; color:var(--lgray); transition:color 0.2s; }
.nav-item.active .nav-txt { color:var(--white); font-weight:600; }
.nav-item:hover .nav-txt { color:var(--white); }
.nav-badge { margin-left:auto; background:linear-gradient(135deg,var(--blue),var(--purple)); color:#fff; font-size:0.65rem; font-weight:700; padding:0.15rem 0.45rem; border-radius:20px; flex-shrink:0; }
.nav-badge.orange { background:var(--orange); }
.nav-badge.green { background:var(--green); }

/* Sidebar bottom */
.sidebar-bottom {
  padding: 0.8rem;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.btn-list-item {
  width: 100%;
  padding: 0.75rem;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  border: none;
  border-radius: 11px;
  color: #fff;
  font-family: 'Cabinet Grotesk', sans-serif;
  font-weight: 700;
  font-size: 0.88rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.btn-list-item:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(79,142,247,0.35); }

/* ══════════════════════════════════════
   MAIN AREA
══════════════════════════════════════ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ── TOPBAR ── */
.topbar {
  height: var(--topbar);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
  gap: 1rem;
  flex-shrink: 0;
}

.topbar-left { display:flex; align-items:center; gap:1rem; flex:1; }

.hamburger {
  display: none;
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 9px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.page-title {
  font-family: 'Cabinet Grotesk', sans-serif;
  font-weight: 800;
  font-size: 1.15rem;
  color: var(--white);
}

.topbar-search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.5rem 1rem;
  flex: 0 1 280px;
}
.topbar-search input {
  background: none; border: none; color: var(--white);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 0.85rem; outline: none; width: 100%;
}
.topbar-search input::placeholder { color:var(--gray); }

.topbar-right { display:flex; align-items:center; gap:0.6rem; margin-left:auto; }

.topbar-btn {
  position: relative;
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex; align-items:center; justify-content:center;
  cursor: pointer; font-size:1rem;
  transition: all 0.2s;
}
.topbar-btn:hover { background:rgba(255,255,255,0.08); border-color:var(--border2); }
.topbar-btn .badge {
  position: absolute;
  top: -3px; right: -3px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--red);
  font-size: 0.55rem;
  font-weight: 700;
  color: #fff;
  display: flex; align-items:center; justify-content:center;
  border: 1.5px solid var(--bg);
}

/* ── CONTENT ── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}
.content::-webkit-scrollbar { width:6px; }
.content::-webkit-scrollbar-track { background:transparent; }
.content::-webkit-scrollbar-thumb { background:rgba(120,140,200,0.2); border-radius:4px; }

/* ══════════════════════════════════════
   WELCOME BANNER
══════════════════════════════════════ */
.welcome-banner {
  background: linear-gradient(135deg, rgba(79,142,247,0.12) 0%, rgba(162,89,255,0.08) 50%, rgba(0,229,255,0.05) 100%);
  border: 1px solid rgba(79,142,247,0.2);
  border-radius: 20px;
  padding: 1.6rem 2rem;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  position: relative;
  overflow: hidden;
}
.welcome-banner::before {
  content: '';
  position: absolute;
  right: -60px; top: -60px;
  width: 220px; height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(79,142,247,0.1) 0%, transparent 70%);
}
.welcome-av { font-size: 3rem; flex-shrink:0; }
.welcome-info { flex:1; min-width:0; }
.welcome-info h2 { font-family:'Cabinet Grotesk',sans-serif; font-weight:800; font-size:1.4rem; margin-bottom:3px; }
.welcome-info p { font-size:0.85rem; color:var(--lgray); }
.welcome-info p span { color:var(--green); font-weight:600; }
.welcome-actions { display:flex; gap:0.6rem; flex-shrink:0; }
.btn-sm {
  padding: 0.6rem 1.2rem;
  border-radius: 10px;
  font-family:'Instrument Sans',sans-serif;
  font-size: 0.82rem; font-weight: 600;
  cursor: pointer; border: none;
  transition: all 0.2s; white-space:nowrap;
}
.btn-sm.primary { background:linear-gradient(135deg,var(--blue),var(--purple)); color:#fff; }
.btn-sm.primary:hover { transform:translateY(-1px); box-shadow:0 5px 16px rgba(79,142,247,0.3); }
.btn-sm.ghost { background:rgba(255,255,255,0.06); color:var(--lgray); border:1px solid var(--border); }
.btn-sm.ghost:hover { background:rgba(255,255,255,0.1); color:var(--white); }

/* ══════════════════════════════════════
   STATS GRID
══════════════════════════════════════ */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; }

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 1.3rem;
  position: relative;
  overflow: hidden;
  transition: all 0.25s;
  animation: fadeUp 0.4s ease both;
}
.stat-card:nth-child(1) { animation-delay:0.05s; }
.stat-card:nth-child(2) { animation-delay:0.1s; }
.stat-card:nth-child(3) { animation-delay:0.15s; }
.stat-card:nth-child(4) { animation-delay:0.2s; }
.stat-card:hover { border-color:var(--border2); transform:translateY(-2px); }
.stat-card::after { content:''; position:absolute; inset:0; background:var(--glow,transparent); opacity:0; border-radius:18px; transition:opacity 0.3s; pointer-events:none; }
.stat-card:hover::after { opacity:1; }

.stat-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
.stat-icon { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
.stat-change { font-size:0.72rem; font-weight:600; padding:0.2rem 0.5rem; border-radius:6px; }
.stat-change.up { color:var(--green); background:rgba(0,208,132,0.12); }
.stat-change.down { color:var(--red); background:rgba(255,68,102,0.12); }
.stat-change.neu { color:var(--lgray); background:rgba(120,140,200,0.1); }

.stat-val { font-family:'Cabinet Grotesk',sans-serif; font-weight:800; font-size:1.8rem; line-height:1; margin-bottom:4px; }
.stat-lbl { font-size:0.78rem; color:var(--lgray); }

/* Sparkline mini chart */
.sparkline { height:32px; margin-top:0.8rem; }
.sparkline svg { width:100%; height:100%; }

/* ══════════════════════════════════════
   TWO COLUMN GRID
══════════════════════════════════════ */
.two-col { display:grid; grid-template-columns:1.4fr 1fr; gap:1rem; }
.three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; }

/* ══════════════════════════════════════
   SECTION CARDS
══════════════════════════════════════ */
.section-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}

.card-head {
  padding: 1.1rem 1.4rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.card-head-left { display:flex; align-items:center; gap:10px; }
.card-head-icon { font-size:1.1rem; }
.card-head h3 { font-family:'Cabinet Grotesk',sans-serif; font-weight:700; font-size:0.95rem; color:var(--white); }
.card-head p { font-size:0.72rem; color:var(--lgray); margin-top:1px; }
.card-head-right { display:flex; align-items:center; gap:0.5rem; }

.btn-tiny {
  padding: 0.3rem 0.7rem;
  background: rgba(79,142,247,0.1);
  border: 1px solid rgba(79,142,247,0.2);
  border-radius: 7px;
  color: var(--blue);
  font-size: 0.73rem;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Instrument Sans', sans-serif;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-tiny:hover { background:rgba(79,142,247,0.2); }

/* ══════════════════════════════════════
   BOOKING ITEMS
══════════════════════════════════════ */
.booking-list { padding: 0.4rem 0; }

.booking-item {
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  align-items: center;
  gap: 1rem;
  padding: 0.9rem 1.4rem;
  border-bottom: 1px solid rgba(99,130,230,0.07);
  transition: background 0.15s;
  cursor: pointer;
}
.booking-item:last-child { border-bottom: none; }
.booking-item:hover { background:rgba(255,255,255,0.02); }

.booking-emoji { width:40px; height:40px; border-radius:12px; background:rgba(79,142,247,0.1); display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
.booking-info strong { display:block; font-size:0.88rem; font-weight:600; color:var(--white); margin-bottom:2px; }
.booking-info span { font-size:0.74rem; color:var(--lgray); }
.booking-price { font-family:'Cabinet Grotesk',sans-serif; font-weight:700; font-size:0.9rem; color:var(--white); text-align:right; white-space:nowrap; }
.booking-price small { display:block; font-size:0.68rem; color:var(--lgray); font-family:'Instrument Sans',sans-serif; font-weight:400; }

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.7rem;
  font-weight: 600;
  padding: 0.25rem 0.65rem;
  border-radius: 20px;
  white-space: nowrap;
}
.status-pill::before { content:''; width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.status-pill.active { color:var(--green); background:rgba(0,208,132,0.1); border:1px solid rgba(0,208,132,0.2); }
.status-pill.active::before { background:var(--green); box-shadow:0 0 5px var(--green); }
.status-pill.pending { color:var(--orange); background:rgba(255,149,0,0.1); border:1px solid rgba(255,149,0,0.2); }
.status-pill.pending::before { background:var(--orange); }
.status-pill.returned { color:var(--lgray); background:rgba(120,140,200,0.08); border:1px solid rgba(120,140,200,0.15); }
.status-pill.returned::before { background:var(--gray); }
.status-pill.confirmed { color:var(--blue); background:rgba(79,142,247,0.1); border:1px solid rgba(79,142,247,0.2); }
.status-pill.confirmed::before { background:var(--blue); }

/* ══════════════════════════════════════
   LISTINGS GRID (small cards)
══════════════════════════════════════ */
.listing-cards { display:grid; grid-template-columns:1fr 1fr; gap:0.8rem; padding:1rem; }

.listing-mini {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.listing-mini:hover { border-color:var(--border2); transform:translateY(-1px); }
.listing-mini-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.7rem; }
.listing-mini-emoji { font-size:1.8rem; }
.listing-mini-menu { width:26px; height:26px; border-radius:7px; background:rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; font-size:0.8rem; cursor:pointer; }
.listing-mini strong { display:block; font-size:0.82rem; font-weight:600; color:var(--white); margin-bottom:3px; line-height:1.3; }
.listing-mini-cat { font-size:0.7rem; color:var(--lgray); margin-bottom:0.7rem; }
.listing-mini-foot { display:flex; justify-content:space-between; align-items:center; }
.listing-mini-price { font-family:'Cabinet Grotesk',sans-serif; font-weight:700; font-size:0.88rem; }
.listing-mini-price span { font-size:0.65rem; font-family:'Instrument Sans',sans-serif; font-weight:400; color:var(--lgray); }
.listing-mini-views { font-size:0.68rem; color:var(--gray); }

/* ══════════════════════════════════════
   ACTIVITY FEED
══════════════════════════════════════ */
.activity-list { padding: 0.6rem 1.2rem 1rem; }

.activity-item {
  display: flex;
  gap: 12px;
  padding: 0.75rem 0;
  border-bottom: 1px solid rgba(99,130,230,0.07);
  position: relative;
}
.activity-item:last-child { border-bottom: none; }

.activity-dot {
  width: 32px; height: 32px;
  border-radius: 10px;
  display: flex; align-items:center; justify-content:center;
  font-size: 0.9rem;
  flex-shrink: 0;
  margin-top: 2px;
}
.activity-dot.blue { background:rgba(79,142,247,0.12); }
.activity-dot.green { background:rgba(0,208,132,0.1); }
.activity-dot.orange { background:rgba(255,149,0,0.1); }
.activity-dot.purple { background:rgba(162,89,255,0.1); }

.activity-body { flex:1; min-width:0; }
.activity-body strong { display:block; font-size:0.82rem; color:var(--white); margin-bottom:1px; }
.activity-body span { font-size:0.73rem; color:var(--lgray); }
.activity-time { font-size:0.68rem; color:var(--gray); flex-shrink:0; margin-top:4px; }

/* ══════════════════════════════════════
   QUICK ACTIONS
══════════════════════════════════════ */
.quick-actions { display:grid; grid-template-columns:repeat(4,1fr); gap:0.8rem; padding:1rem; }

.qa-btn {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1rem 0.8rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
  display: flex; flex-direction:column; align-items:center; gap:0.5rem;
}
.qa-btn:hover { border-color:var(--border2); transform:translateY(-2px); background:rgba(79,142,247,0.06); }
.qa-icon { font-size:1.6rem; }
.qa-label { font-size:0.75rem; color:var(--lgray); font-weight:500; line-height:1.3; }

/* ══════════════════════════════════════
   EARNINGS CHART
══════════════════════════════════════ */
.chart-area {
  padding: 1.2rem 1.4rem;
  height: 180px;
  position: relative;
}

.chart-labels {
  display: flex;
  justify-content: space-between;
  padding: 0.5rem 1.4rem 0;
}
.chart-labels span { font-size:0.68rem; color:var(--gray); }

/* ══════════════════════════════════════
   PROGRESS BARS
══════════════════════════════════════ */
.progress-list { padding: 1rem 1.4rem; display:flex; flex-direction:column; gap:1rem; }

.prog-item label { display:block; font-size:0.78rem; color:var(--lgray); margin-bottom:0.4rem; display:flex; justify-content:space-between; }
.prog-item label span { color:var(--white); font-weight:600; }
.prog-bar { height:6px; background:rgba(120,140,200,0.1); border-radius:10px; overflow:hidden; }
.prog-fill { height:100%; border-radius:10px; transition:width 1s cubic-bezier(0.4,0,0.2,1); }

/* ══════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════ */
.empty-state {
  padding: 2rem;
  text-align: center;
  color: var(--gray);
}
.empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.8rem; opacity:0.5; }
.empty-state p { font-size: 0.85rem; color: var(--lgray); margin-bottom: 1rem; }

/* ══════════════════════════════════════
   NOTIFICATION PANEL
══════════════════════════════════════ */
.notif-panel {
  position: fixed;
  top: calc(var(--topbar) + 8px);
  right: 1rem;
  width: 320px;
