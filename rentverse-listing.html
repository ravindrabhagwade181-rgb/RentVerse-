<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentVerse — My Listings</title>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:     #070a12;
  --surf:   #0c101a;
  --card:   #111520;
  --card2:  #141825;
  --bdr:    rgba(99,130,230,0.13);
  --bdr2:   rgba(99,130,230,0.25);
  --blue:   #4f8ef7;
  --purple: #a259ff;
  --cyan:   #00e5ff;
  --green:  #00d084;
  --orange: #ff9500;
  --pink:   #ff6b9d;
  --red:    #ff4466;
  --white:  #eef2ff;
  --lgray:  #8892aa;
  --gray:   #525d75;
}

html,body { min-height:100vh; background:var(--bg); color:var(--white); font-family:'Instrument Sans',sans-serif; }

@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes spin   { to{transform:rotate(360deg)} }

/* ── BG ── */
.bg-fx {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 40% at 15% 10%, rgba(79,142,247,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 80%, rgba(162,89,255,0.08) 0%, transparent 60%);
}
.bg-grid {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(79,142,247,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,142,247,0.035) 1px, transparent 1px);
  background-size:52px 52px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
}

/* ── TOPBAR ── */
.topbar {
  position:sticky; top:0; z-index:100;
  background:rgba(7,10,18,0.88);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bdr);
  padding:0 1.5rem; height:60px;
  display:flex; align-items:center; justify-content:space-between;
}
.topbar-left { display:flex; align-items:center; gap:14px; }
.back-btn {
  width:36px; height:36px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--bdr); border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:1rem; transition:all 0.2s;
  text-decoration:none; color:var(--white);
}
.back-btn:hover { background:rgba(255,255,255,0.1); border-color:var(--bdr2); }
.page-title { font-family:'Cabinet Grotesk',sans-serif; font-weight:800; font-size:1.1rem; }
.topbar-right { display:flex; align-items:center; gap:0.6rem; }

/* ── MAIN ── */
.main { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:1.5rem; }

/* ── VIEW TOGGLE ── */
.view-toggle {
  display:flex; gap:4px;
  background:var(--surf); border:1px solid var(--bdr);
  border-radius:12px; padding:4px; margin-bottom:1.5rem;
}
.vtab {
  flex:1; padding:0.65rem 1rem; border-radius:9px;
  font-family:'Cabinet Grotesk',sans-serif; font-weight:700; font-size:0.88rem;
  cursor:pointer; border:none; background:transparent; color:var(--lgray);
  transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:7px;
}
.vtab.active {
  background:linear-gradient(135deg,rgba(79,142,247,0.18),rgba(162,89,255,0.12));
  color:var(--white); border:1px solid rgba(79,142,247,0.25);
}
.vtab-count {
  background:rgba(79,142,247,0.2); color:var(--blue);
  font-size:0.68rem; font-weight:700;
  padding:0.15rem 0.45rem; border-radius:20px;
}

/* ── STATS ROW ── */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:1.5rem; }
.stat-mini {
  background:var(--card); border:1px solid var(--bdr);
  border-radius:16px; padding:1.1rem;
  display:flex; align-items:center; gap:12px;
  animation:fadeUp 0.4s ease both;
}
.stat-mini:nth-child(1){animation-delay:0.05s}
.stat-mini:nth-child(2){animation-delay:0.1s}
.stat-mini:nth-child(3){animation-delay:0.15s}
.stat-mini:nth-child(4){animation-delay:0.2s}
.stat-mini-icon { width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0; }
.stat-mini-val  { font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:1.4rem;line-height:1; }
.stat-mini-lbl  { font-size:0.72rem;color:var(--lgray);margin-top:2px; }

/* ── SECTION ── */
.section {
  background:var(--card); border:1px solid var(--bdr);
  border-radius:20px; overflow:hidden;
  animation:fadeUp 0.4s ease both;
}
.sec-head {
  padding:1.2rem 1.5rem; border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
}
.sec-head-l { display:flex;align-items:center;gap:10px; }
.sec-head-icon { font-size:1.1rem; }
.sec-head h2 { font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:1rem; }
.sec-head p  { font-size:0.73rem;color:var(--lgray);margin-top:1px; }

/* ── BUTTONS ── */
.btn {
  padding:0.65rem 1.3rem; border-radius:10px;
  font-family:'Cabinet Grotesk',sans-serif; font-weight:700; font-size:0.85rem;
  cursor:pointer; border:none; transition:all 0.2s;
  display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
}
.btn-primary { background:linear-gradient(135deg,var(--blue),var(--purple)); color:#fff; }
.btn-primary:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 6px 20px rgba(79,142,247,0.3); }
.btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none!important; }
.btn-ghost  { background:rgba(255,255,255,0.05); color:var(--lgray); border:1px solid var(--bdr); }
.btn-ghost:hover  { background:rgba(255,255,255,0.09); color:var(--white); }
.btn-danger { background:rgba(255,68,102,0.1); color:var(--red); border:1px solid rgba(255,68,102,0.2); }
.btn-danger:hover { background:rgba(255,68,102,0.2); }
.btn-sm { padding:0.4rem 0.8rem; font-size:0.75rem; }

/* ── LISTINGS GRID ── */
.listings-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:1rem; padding:1.2rem;
}
.listing-card {
  background:var(--card2); border:1px solid var(--bdr);
  border-radius:16px; overflow:hidden;
  transition:all 0.25s; animation:fadeUp 0.4s ease both; position:relative;
}
.listing-card:hover { border-color:var(--bdr2); transform:translateY(-3px); box-shadow:0 12px 32px rgba(0,0,0,0.3); }
.listing-card-img {
  height:130px;
  background:linear-gradient(135deg,rgba(79,142,247,0.1),rgba(162,89,255,0.08));
  display:flex; align-items:center; justify-content:center;
  font-size:3.5rem; position:relative; overflow:hidden;
}
.listing-card-img::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(to bottom, transparent 50%, rgba(7,10,18,0.8));
}
.listing-status-badge {
  position:absolute; top:10px; right:10px;
  padding:0.22rem 0.6rem; border-radius:20px;
  font-size:0.68rem; font-weight:700; z-index:1;
}
.status-active   { background:rgba(0,208,132,0.15); color:var(--green); border:1px solid rgba(0,208,132,0.25); }
.status-inactive { background:rgba(120,140,200,0.1); color:var(--lgray); border:1px solid rgba(120,140,200,0.2); }
.listing-card-body   { padding:1rem; }
.listing-card-title  { font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:0.95rem;margin-bottom:4px;line-height:1.3; }
.listing-card-cat    { font-size:0.73rem;color:var(--lgray);margin-bottom:0.8rem;display:flex;align-items:center;gap:5px; }
.listing-card-meta   { display:flex;justify-content:space-between;align-items:center;margin-bottom:0.9rem; }
.listing-price       { font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:1.05rem;color:var(--blue); }
.listing-price span  { font-size:0.65rem;color:var(--lgray);font-family:'Instrument Sans',sans-serif;font-weight:400; }
.listing-views       { font-size:0.72rem;color:var(--gray); }
.listing-card-actions { display:flex; gap:6px; }
.listing-card-actions .btn { flex:1; justify-content:center; }

/* ── FILTER BAR ── */
.filter-bar { display:flex;gap:0.6rem;padding:0 1.2rem 1rem;flex-wrap:wrap;align-items:center; }
.filter-pill {
  padding:0.4rem 0.9rem; border-radius:20px;
  font-size:0.78rem; font-weight:600; cursor:pointer; border:none;
  background:rgba(255,255,255,0.05); color:var(--lgray); transition:all 0.2s;
}
.filter-pill.active { background:rgba(79,142,247,0.15); color:var(--blue); border:1px solid rgba(79,142,247,0.25); }
.filter-pill:hover  { background:rgba(255,255,255,0.08); color:var(--white); }
.search-box {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,0.04); border:1px solid var(--bdr);
  border-radius:10px; padding:0.4rem 0.9rem;
  flex:1; min-width:180px; transition:border-color 0.2s;
}
.search-box:focus-within { border-color:var(--bdr2); }
.search-box input { background:none;border:none;color:var(--white);font-family:'Instrument Sans',sans-serif;font-size:0.85rem;outline:none;width:100%; }
.search-box input::placeholder { color:var(--gray); }

/* ── EMPTY STATE ── */
.empty-state { text-align:center;padding:3rem 1.5rem;color:var(--gray); }
.empty-icon   { font-size:3rem;margin-bottom:0.8rem;opacity:0.5; }
.empty-state h3 { font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:1.1rem;color:var(--lgray);margin-bottom:0.4rem; }
.empty-state p  { font-size:0.85rem;color:var(--gray);margin-bottom:1.2rem;line-height:1.6; }

/* ── ADD VIEW ── */
#addView { display:none; }

.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; padding:1.5rem; }
.form-col  { display:flex; flex-direction:column; gap:1.2rem; }
.form-group { display:flex; flex-direction:column; gap:0.5rem; }
.form-group label { font-size:0.78rem;font-weight:600;color:var(--lgray);letter-spacing:0.3px;display:flex;align-items:center;gap:5px; }
.form-group label .req { color:var(--pink); }

.form-control {
  width:100%; padding:0.82rem 1rem;
  background:rgba(255,255,255,0.04);
  border:1.5px solid var(--bdr); border-radius:12px;
  color:var(--white); font-family:'Instrument Sans',sans-serif;
  font-size:0.92rem; outline:none; transition:all 0.25s;
  -webkit-appearance:none; appearance:none;
}
.form-control::placeholder { color:rgba(82,93,117,0.8); }
.form-control:focus { border-color:var(--blue); background:rgba(79,142,247,0.05); box-shadow:0 0 0 4px rgba(79,142,247,0.1); }
.form-control.err   { border-color:rgba(255,68,102,0.5)!important; }
select.form-control option { background:#0a0d16; }
textarea.form-control { resize:vertical; min-height:100px; line-height:1.6; }

.price-wrap { position:relative; }
.price-wrap .currency { position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--lgray);font-size:0.9rem;pointer-events:none; }
.price-wrap .form-control { padding-left:2rem; }
.price-wrap .per-day { position:absolute;right:1rem;top:50%;transform:translateY(-50%);font-size:0.75rem;color:var(--gray);pointer-events:none; }

.cat-picker { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
.cat-opt {
  padding:0.7rem 0.4rem; border-radius:12px;
  background:rgba(255,255,255,0.04); border:1.5px solid var(--bdr);
  cursor:pointer; transition:all 0.2s; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:4px;
}
.cat-opt:hover { border-color:var(--bdr2); background:rgba(255,255,255,0.07); }
.cat-opt.sel   { border-color:var(--blue); background:rgba(79,142,247,0.1); }
.cat-opt-icon  { font-size:1.5rem; }
.cat-opt-name  { font-size:0.58rem; color:var(--lgray); line-height:1.2; }

.condition-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.cond-opt {
  padding:0.7rem 0.5rem; border-radius:10px;
  background:rgba(255,255,255,0.04); border:1.5px solid var(--bdr);
  cursor:pointer; transition:all 0.2s; text-align:center;
  font-size:0.78rem; font-weight:600; color:var(--lgray);
}
.cond-opt:hover { border-color:var(--bdr2); color:var(--white); }
.cond-opt.sel   { border-color:var(--blue); background:rgba(79,142,247,0.1); color:var(--blue); }

/* ── FORM STEPS ── */
.form-steps {
  display:flex; align-items:center; gap:0;
  padding:1.2rem 1.5rem; border-bottom:1px solid var(--bdr);
}
.form-step { display:flex; align-items:center; gap:10px; flex:1; }
.step-num {
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:0.75rem; font-weight:700; flex-shrink:0;
  background:rgba(120,140,200,0.1); color:var(--gray);
  border:1.5px solid rgba(120,140,200,0.15); transition:all 0.3s;
}
.step-num.active { background:linear-gradient(135deg,var(--blue),var(--purple)); color:#fff; border-color:transparent; }
.step-num.done   { background:rgba(0,208,132,0.15); color:var(--green); border-color:rgba(0,208,132,0.3); }
.step-label       { font-size:0.75rem;font-weight:600;color:var(--gray);white-space:nowrap; }
.step-label.active{ color:var(--white); }
.step-connector   { flex:1;height:1.5px;background:rgba(120,140,200,0.15);margin:0 8px; }
.step-connector.done { background:linear-gradient(90deg,var(--blue),var(--purple)); }

.form-panel        { display:none; animation:fadeUp 0.3s ease both; }
.form-panel.active { display:block; }

.upload-zone {
  border:2px dashed rgba(79,142,247,0.25); border-radius:16px;
  padding:2rem 1rem; text-align:center; cursor:pointer; transition:all 0.25s;
  background:rgba(79,142,247,0.03);
}
.upload-zone:hover { border-color:rgba(79,142,247,0.5); background:rgba(79,142,247,0.06); }
.upload-zone .upload-icon { font-size:2.5rem;margin-bottom:0.6rem; }
.upload-zone p     { font-size:0.82rem;color:var(--lgray);margin-bottom:0.3rem; }
.upload-zone small { font-size:0.72rem;color:var(--gray); }

.listing-preview {
  background:linear-gradient(135deg,rgba(79,142,247,0.08),rgba(162,89,255,0.06));
  border:1px solid rgba(79,142,247,0.2); border-radius:16px;
  padding:1.2rem; display:flex; align-items:flex-start; gap:1rem;
}
.preview-emoji  { font-size:2.5rem;flex-shrink:0; }
.preview-info h3 { font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:0.95rem;margin-bottom:4px; }
.preview-info p  { font-size:0.78rem;color:var(--lgray);line-height:1.5; }

.form-footer {
  padding:1.2rem 1.5rem; border-top:1px solid var(--bdr);
  display:flex; align-items:center; justify-content:space-between; gap:1rem;
}

.hint         { font-size:0.72rem;color:var(--gray);margin-top:0.3rem; }
.hint.success { color:var(--green); }
.hint.error   { color:var(--red); }

/* ── SUBMIT SPINNER ── */
.btn-spinner {
  display:none; width:18px; height:18px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff; border-radius:50%;
  animation:spin 0.7s linear infinite;
}
.btn-loading .btn-txt { display:none; }
.btn-loading .btn-spinner { display:inline-block; }

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,5,20,0.85); backdrop-filter:blur(10px);
  display:none; align-items:center; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal-box {
  background:var(--card); border:1px solid var(--bdr2);
  border-radius:20px; padding:2rem;
  max-width:380px; width:90%; text-align:center;
  animation:fadeUp 0.3s ease both;
}
.modal-icon { font-size:2.5rem;margin-bottom:1rem; }
.modal-box h3 { font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:1.1rem;margin-bottom:0.5rem; }
.modal-box p  { font-size:0.85rem;color:var(--lgray);margin-bottom:1.5rem;line-height:1.6; }
.modal-btns   { display:flex;gap:0.6rem; }
.modal-btns .btn { flex:1;justify-content:center; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:1.5rem; right:1.5rem; z-index:999;
  padding:0.85rem 1.3rem; border-radius:12px;
  font-size:0.85rem; font-weight:500;
  display:flex; align-items:center; gap:8px;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  transform:translateX(130%);
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  max-width:300px; pointer-events:none;
}
.toast.show    { transform:translateX(0); pointer-events:auto; }
.toast.success { background:rgba(0,208,132,0.15); border:1px solid rgba(0,208,132,0.3); color:#00d084; }
.toast.error   { background:rgba(255,68,102,0.12); border:1px solid rgba(255,68,102,0.3); color:#ff6680; }
.toast.info    { background:rgba(79,142,247,0.12); border:1px solid rgba(79,142,247,0.25); color:#7ab0ff; }

/* ── RESPONSIVE ── */
@media(max-width:768px) {
  .stats-row     { grid-template-columns:1fr 1fr; }
  .form-grid     { grid-template-columns:1fr; }
  .listings-grid { grid-template-columns:1fr; }
  .main          { padding:1rem; }
  .form-steps    { padding:1rem; }
  .step-label    { display:none; }
  .condition-grid{ grid-template-columns:repeat(2,1fr); }
}
@media(max-width:480px) {
  .cat-picker { grid-template-columns:repeat(4,1fr); }
}
</style>
</head>
<body>

<div class="bg-fx"></div>
<div class="bg-grid"></div>

<!-- ── TOPBAR ── -->
<div class="topbar">
  <div class="topbar-left">
    <a href="rentverse-dashboard.html" class="back-btn" title="Dashboard">←</a>
    <div class="page-title" id="topTitle">My Listings</div>
  </div>
  <div class="topbar-right">
    <button class="btn btn-primary" id="addNewBtn" onclick="showAddForm()">＋ Add Listing</button>
  </div>
</div>

<div class="main">

  <!-- ── VIEW TOGGLE ── -->
  <div class="view-toggle">
    <button class="vtab active" id="myListTab" onclick="showView('my')">
      📋 My Listings <span class="vtab-count" id="myCount">0</span>
    </button>
    <button class="vtab" id="addListTab" onclick="showView('add')">
      ➕ Add New Listing
    </button>
  </div>

  <!-- ════════ MY LISTINGS VIEW ════════ -->
  <div id="myView">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-mini">
        <div class="stat-mini-icon" style="background:rgba(79,142,247,0.12)">📋</div>
        <div><div class="stat-mini-val" id="sTotal">0</div><div class="stat-mini-lbl">Total Listings</div></div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-icon" style="background:rgba(0,208,132,0.1)">✅</div>
        <div><div class="stat-mini-val" id="sActive">0</div><div class="stat-mini-lbl">Active</div></div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-icon" style="background:rgba(162,89,255,0.1)">👁</div>
        <div><div class="stat-mini-val" id="sViews">0</div><div class="stat-mini-lbl">Total Views</div></div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-icon" style="background:rgba(255,149,0,0.1)">💰</div>
        <div><div class="stat-mini-val" id="sEarned">₹0</div><div class="stat-mini-lbl">Earnings</div></div>
      </div>
    </div>

    <!-- Listings section -->
    <div class="section">
      <div class="sec-head">
        <div class="sec-head-l">
          <span class="sec-head-icon">📋</span>
          <div>
            <h2>All Listings</h2>
            <p id="listingSubtitle">Loading…</p>
          </div>
        </div>
      </div>

      <div class="filter-bar">
        <div class="search-box">
          <span style="color:var(--gray);font-size:0.9rem">🔍</span>
          <input type="text" id="searchInp" placeholder="Search your listings…" oninput="renderListings()">
        </div>
        <button class="filter-pill active" data-filter="all"      onclick="setFilter('all',this)">All</button>
        <button class="filter-pill"        data-filter="active"   onclick="setFilter('active',this)">Active</button>
